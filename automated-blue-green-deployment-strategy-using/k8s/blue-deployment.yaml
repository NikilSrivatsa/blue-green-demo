apiVersion: apps/v1
kind: Deployment
metadata:
  name: blue-green-demo-blue
  namespace: blue-green-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: blue-green-demo
      color: blue
  template:
    metadata:
      labels:
        app: blue-green-demo
        color: blue
    spec:
      containers:
        - name: app
          image: docker.io/your-dockerhub-user/blue-green-demo:initial
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: APP_COLOR
              value: blue
            - name: APP_VERSION
              value: initial
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
